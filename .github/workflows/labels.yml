name: Sync labels

# Applies .github/labels.yml to the repo's labels. Non-destructive
# (skip-delete) — existing labels not listed here are left alone.
on:
  push:
    branches: [main]
    paths:
      - ".github/labels.yml"
      - ".github/workflows/labels.yml"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  labeler:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: crazy-max/ghaction-github-labeler@v5
        with:
          yaml-file: .github/labels.yml
          skip-delete: true
          dry-run: false
