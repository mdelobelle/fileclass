name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write     # required for build provenance attestation
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22.x"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build plugin
        run: npm run build

      # Provenance: lets users cryptographically verify these assets were built
      # from this repo by this workflow (Obsidian review recommendation).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            styles.css

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          # Obsidian only downloads main.js/manifest.json/styles.css — no extras.
          gh release create "$tag" \
            --title="$tag" \
            --generate-notes \
            --draft \
            main.js manifest.json styles.css
